<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Alok! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Loading -->
    <div id="loading" class="loading">
        <h2>Initializing Birthday Surprise for Alok...</h2>
        <div class="progress"></div>
    </div>

    <div class="main-content">
        <!-- Hero -->
        <header class="hero">
            <div class="hero-content">
                <h1>Happy Birthday,<br><span>Alok!</span> 🎂</h1>
                <p>Wishing you joy, success & unforgettable moments ❤️</p>
                <button onclick="startParty()">Start the Celebration 🎉</button>
            </div>
            <img src="assets/hero-photo.jpg" alt="Alok" class="hero-img">
        </header>

        <section class="memories">
            <h2>Beautiful Memories</h2>
            <div class="gallery">
                <img src="assets/memory-1.jpg" alt="">
                <img src="assets/memory-2.jpg" alt="">
                <img src="assets/memory-3.jpg" alt="">
                <img src="assets/memory-4.jpg" alt="">
            </div>
        </section>

        <section class="message-box">
            <h2>A Special Wish</h2>
            <p id="typed-message"></p>
        </section>

        <section class="wishes">
            <h2>Send Your Wish</h2>
            <textarea id="wish" placeholder="Alok ke liye wish likho..."></textarea>
            <button onclick="addWish()">Send Wish</button>
            <div id="wish-list"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
