<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Alok! 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hero">
        <h1>Happy Birthday, Alok! 🎂</h1>
        <img src="assets/hero-photo.jpg" alt="Alok" class="hero-photo">
        <button onclick="celebrate()">Start Celebration 🎉</button>
    </div>

    <div class="gallery">
        <img src="assets/memory-1.jpg" alt="Memory 1">
        <img src="assets/memory-2.jpg" alt="Memory 2">
        <img src="assets/memory-3.jpg" alt="Memory 3">
    </div>

    <script>
        function celebrate() {
            for(let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.textContent = ['🎉','❤️','✨','🎊'][Math.floor(Math.random()*4)];
                    confetti.style.position = 'fixed';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-50px';
                    confetti.style.fontSize = '30px';
                    document.body.appendChild(confetti);
                    let y = 0;
                    const fall = setInterval(() => {
                        y += 8;
                        confetti.style.top = y + 'vh';
                        if(y > 120) {
                            clearInterval(fall);
                            confetti.remove();
                        }
                    }, 20);
                }, i * 10);
            }
        }
    </script>
</body>
</html>
