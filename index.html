<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
/* ============================================================
   ROOT TOKENS — Royal Blue + Gold + White design system
   ============================================================ */
:root{
  --midnight:#060a1a;
  --royal-deep:#0a1740;
  --royal:#0f2166;
  --royal-light:#1f3f9e;
  --gold:#d4af37;
  --gold-bright:#f3d77a;
  --gold-soft:#f8e9c1;
  --cream:#f6f1e4;
  --white:#ffffff;
  --glass-bg:rgba(255,255,255,0.055);
  --glass-bg-strong:rgba(255,255,255,0.09);
  --glass-border:rgba(212,175,55,0.35);
  --shadow-gold:0 0 40px rgba(212,175,55,0.25);
  --ease-royal:cubic-bezier(.22,1,.36,1);
  --font-display:'Playfair Display',serif;
  --font-letter:'Cormorant Garamond',serif;
  --font-ui:'Montserrat',sans-serif;
}

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
html,body{
  background:var(--midnight);
  color:var(--cream);
  font-family:var(--font-ui);
  overflow-x:hidden;
  width:100%;
  height:100%;
}
body{ position:relative; }

::selection{ background:var(--gold); color:var(--royal-deep); }

/* Thin gold scrollbar */
::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-track{ background:var(--midnight); }
::-webkit-scrollbar-thumb{ background:linear-gradient(var(--gold),var(--royal-light)); border-radius:10px; }

/* Respect reduced motion preference */
@media (prefers-reduced-motion:reduce){
  *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; scroll-behavior:auto !important; }
}

/* ============================================================
   AMBIENT BACKGROUND CANVAS — stars, fireflies, gold dust, mouse glow
   Sits behind everything, fixed, non-interactive.
   ============================================================ */
#bgCanvas{
  position:fixed; inset:0; width:100vw; height:100vh;
  z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 50% -10%, rgba(31,63,158,0.35), transparent 60%),
    radial-gradient(ellipse at 90% 110%, rgba(212,175,55,0.10), transparent 55%),
    linear-gradient(180deg, var(--midnight) 0%, var(--royal-deep) 45%, var(--midnight) 100%);
}

/* Cinematic vignette — darkens edges slightly on every scene for depth */
#vignette{
  position:fixed; inset:0; z-index:3; pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
}

/* Full-screen gold flash used for the loading -> reveal transition */
#revealFlash{
  position:fixed; inset:0; z-index:99; pointer-events:none;
  background:radial-gradient(circle, #fff8e0 0%, var(--gold-bright) 35%, transparent 72%);
  opacity:0;
}
#revealFlash.fire{ animation:revealFlashAnim 0.9s ease-out forwards; }
@keyframes revealFlashAnim{
  0%{ opacity:0; }
  15%{ opacity:1; }
  100%{ opacity:0; }
}

/* ============================================================
   GLASSMORPHISM CARD — base utility class
   ============================================================ */
.glass{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  border-radius:24px;
  box-shadow:0 8px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
}

/* Gold monogram seal — the site's recurring signature element */
.seal{
  --size:74px;
  width:var(--size); height:var(--size);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  position:relative;
  background:radial-gradient(circle at 35% 30%, #fff7d8, var(--gold) 45%, #8a6a17 100%);
  box-shadow:0 0 0 3px rgba(212,175,55,0.25), 0 0 30px rgba(212,175,55,0.55), inset 0 2px 6px rgba(255,255,255,0.6), inset 0 -6px 10px rgba(0,0,0,0.35);
}
.seal::before{
  content:"";
  position:absolute; inset:6px;
  border-radius:50%;
  border:1.5px dashed rgba(10,23,64,0.55);
}
.seal span{
  font-family:var(--font-display);
  font-weight:800;
  font-size:calc(var(--size)*0.42);
  color:var(--royal-deep);
  text-shadow:0 1px 0 rgba(255,255,255,0.4);
}
.seal.spin{ animation:sealSpin 14s linear infinite; }
@keyframes sealSpin{ to{ transform:rotate(360deg); } }

/* Gold button — primary CTA style used across all scenes */
.btn-gold{
  font-family:var(--font-ui);
  font-weight:600;
  font-size:15px;
  letter-spacing:.04em;
  color:var(--royal-deep);
  background:linear-gradient(135deg, var(--gold-bright), var(--gold) 60%, #b8902c);
  border:none;
  padding:16px 34px;
  border-radius:100px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(212,175,55,0.35), inset 0 1px 0 rgba(255,255,255,0.6);
  transition:transform .35s var(--ease-royal), box-shadow .35s var(--ease-royal);
}
.btn-gold:hover{ transform:translateY(-3px) scale(1.03); box-shadow:0 16px 40px rgba(212,175,55,0.5), inset 0 1px 0 rgba(255,255,255,0.7); }
.btn-gold:active{ transform:translateY(0) scale(.98); }
.btn-gold:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:4px; }

.btn-ghost{
  font-family:var(--font-ui); font-weight:500; font-size:14px; letter-spacing:.04em;
  color:var(--gold-soft); background:var(--glass-bg); border:1px solid var(--glass-border);
  padding:14px 28px; border-radius:100px; cursor:pointer;
  backdrop-filter:blur(12px);
  transition:all .3s var(--ease-royal);
}
.btn-ghost:hover{ background:var(--glass-bg-strong); border-color:var(--gold); color:var(--white); transform:translateY(-2px); }
.btn-ghost:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:3px; }

/* Shared "eyebrow" label used to name each scene like invitation stationery */
.eyebrow{
  font-family:var(--font-ui); font-weight:600; font-size:12px;
  letter-spacing:.35em; text-transform:uppercase;
  color:var(--gold-bright); opacity:.85; margin-bottom:18px;
  display:inline-block;
}

/* ============================================================
   SCENE 1 — LOADING / TAP TO BEGIN / TYPEWRITER / COUNTDOWN
   ============================================================ */
#loadingScreen{
  position:fixed; inset:0; z-index:100;
  background:#000;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column;
  text-align:center;
  transition:opacity 1.1s var(--ease-royal), visibility 1.1s;
}
#loadingScreen.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

#starsLayer{ position:absolute; inset:0; }

.tap-begin{
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:22px;
  cursor:pointer;
  padding:20px;
}
.tap-begin p{
  font-family:var(--font-letter); font-style:italic; font-size:17px;
  color:var(--gold-soft); opacity:.8; letter-spacing:.03em;
}
.tap-begin .pulse-ring{
  position:absolute; inset:-20px; border-radius:50%;
  border:1px solid rgba(212,175,55,0.4);
  animation:pulseRing 2.4s ease-out infinite;
}
@keyframes pulseRing{ 0%{ transform:scale(.8); opacity:.9;} 100%{ transform:scale(1.6); opacity:0; } }

.typing-wrap{
  position:relative; z-index:2;
  display:none;
  flex-direction:column; align-items:center; gap:14px;
  padding:0 24px;
  max-width:640px;
}
.typing-wrap.active{ display:flex; }
.typing-line{
  font-family:var(--font-letter); font-style:italic;
  font-size:clamp(19px,4.4vw,30px);
  color:var(--cream);
  min-height:1.4em;
  border-right:2px solid var(--gold-bright);
  padding-right:6px;
  white-space:nowrap; overflow:hidden;
}
.typing-line.done{ border-right:none; }

#countdownWrap{
  display:none; z-index:2;
  flex-direction:column; align-items:center; gap:6px;
}
#countdownWrap.active{ display:flex; }
#countdownNum{
  font-family:var(--font-display); font-weight:800;
  font-size:clamp(70px,20vw,150px);
  background:linear-gradient(180deg,var(--gold-bright),var(--gold) 70%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 60px rgba(212,175,55,0.5);
}
#countdownWrap span.label{ font-size:12px; letter-spacing:.4em; text-transform:uppercase; color:var(--gold-soft); opacity:.6; }

/* ============================================================
   MAIN CONTENT — scroll-snapped cinematic scenes
   ============================================================ */
#mainContent{
  position:relative; z-index:1;
  opacity:0;
  scroll-snap-type:y proximity;
}
#mainContent.revealed{ opacity:1; transition:opacity 1.4s ease; }

.scene{
  min-height:100vh; min-height:100svh;
  width:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative;
  padding:90px 20px;
  scroll-snap-align:start;
  overflow:hidden;
}

.reveal-el{ opacity:0; transform:translateY(36px); transition:opacity .9s var(--ease-royal), transform .9s var(--ease-royal); }
.reveal-el.in-view{ opacity:1; transform:translateY(0); }
.reveal-el.d1{ transition-delay:.12s; }
.reveal-el.d2{ transition-delay:.24s; }
.reveal-el.d3{ transition-delay:.36s; }
.reveal-el.d4{ transition-delay:.48s; }

/* --- Divider between scenes: thin gold line with seal --- */
.scene-divider{
  display:flex; align-items:center; gap:16px;
  width:min(320px,70%);
  margin:0 auto 40px;
  opacity:.7;
}
.scene-divider .line{ flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.scene-divider .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold-bright); box-shadow:0 0 10px var(--gold); }

/* --- Scene 2: Hero Reveal --- */
#scene2{ text-align:center; }
.hero-photo-frame{
  display:none; align-items:center; justify-content:center;
  width:150px; height:150px; border-radius:50%; margin:0 auto 22px;
  padding:6px;
  background:conic-gradient(from 0deg, var(--gold), var(--gold-bright), var(--gold), var(--royal-light), var(--gold));
  box-shadow:0 0 40px rgba(212,175,55,0.4);
  animation:sealSpin 18s linear infinite;
}
.hero-photo-frame img{
  width:100%; height:100%; object-fit:cover; border-radius:50%;
  border:3px solid var(--midnight);
  animation:sealSpin 18s linear infinite reverse; /* counter-rotate so the photo itself stays upright */
}
.hero-title{
  font-family:var(--font-display); font-weight:900;
  font-size:clamp(38px,9vw,96px);
  line-height:1.05;
  background:linear-gradient(180deg,#fff, var(--gold-bright) 55%, var(--gold) 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 80px rgba(212,175,55,0.35);
  letter-spacing:.01em;
}
.hero-sub{
  font-family:var(--font-letter); font-style:italic; font-weight:500;
  font-size:clamp(18px,3vw,26px);
  color:var(--gold-soft); margin-top:20px; opacity:.9;
}
.hero-name-underline{
  display:block; width:min(340px,60vw); height:2px; margin:26px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.scroll-hint{
  margin-top:56px; font-size:11px; letter-spacing:.3em; text-transform:uppercase;
  color:var(--gold-soft); opacity:.55; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.scroll-hint .chevron{ width:10px; height:10px; border-right:1.5px solid var(--gold-bright); border-bottom:1.5px solid var(--gold-bright); transform:rotate(45deg); animation:chevBounce 1.8s ease-in-out infinite; }
@keyframes chevBounce{ 0%,100%{ transform:translateY(0) rotate(45deg); opacity:.4;} 50%{ transform:translateY(8px) rotate(45deg); opacity:1;} }

/* --- Scene 3: Letter --- */
.letter-card{
  width:min(640px,92vw);
  padding:clamp(32px,6vw,64px);
  position:relative;
}
.letter-card::before{
  content:""; position:absolute; top:18px; right:18px; width:44px; height:44px;
  background:radial-gradient(circle at 35% 30%, #fff7d8, var(--gold) 45%, #8a6a17 100%);
  border-radius:50%; opacity:.9; box-shadow:0 0 20px rgba(212,175,55,0.5);
}
.letter-greeting{ font-family:var(--font-letter); font-style:italic; font-size:clamp(22px,4vw,28px); color:var(--gold-bright); margin-bottom:22px; }
.letter-line{
  font-family:var(--font-letter); font-size:clamp(18px,3vw,23px); line-height:1.85;
  color:var(--cream); opacity:0; transform:translateY(14px);
  transition:opacity .8s var(--ease-royal), transform .8s var(--ease-royal);
}
.letter-card.in-view .letter-line{ opacity:1; transform:translateY(0); }
.letter-line:nth-child(1){ transition-delay:.1s; }
.letter-line:nth-child(2){ transition-delay:.35s; }
.letter-line:nth-child(3){ transition-delay:.6s; }
.letter-line:nth-child(4){ transition-delay:.85s; }
.letter-line:nth-child(5){ transition-delay:1.1s; }
.letter-signoff{ margin-top:26px; font-family:var(--font-letter); font-style:italic; font-size:clamp(20px,3.4vw,25px); color:var(--gold-bright); }

/* --- Scene 4: Cake --- */
.cake-stage{ perspective:1200px; margin-bottom:40px; }
.cake{
  position:relative; width:220px; height:190px;
  transform-style:preserve-3d;
  animation:cakeFloat 5s ease-in-out infinite;
}
@keyframes cakeFloat{ 0%,100%{ transform:translateY(0) rotateY(-8deg);} 50%{ transform:translateY(-10px) rotateY(8deg);} }
.tier{ position:absolute; left:50%; border-radius:14px; box-shadow:0 14px 30px rgba(0,0,0,0.45), inset 0 -10px 18px rgba(0,0,0,0.25), inset 0 6px 10px rgba(255,255,255,0.25); }
.tier.base{ bottom:0; width:220px; height:80px; margin-left:-110px; background:linear-gradient(180deg,#fff, #e9e0c6); }
.tier.mid{ bottom:70px; width:170px; height:65px; margin-left:-85px; background:linear-gradient(180deg,var(--gold-bright), var(--gold)); }
.tier.top{ bottom:125px; width:120px; height:56px; margin-left:-60px; background:linear-gradient(180deg,#fff, #e9e0c6); }
.drip{ position:absolute; bottom:118px; left:50%; margin-left:-60px; width:120px; height:16px; background:radial-gradient(circle,var(--gold-bright) 0 40%, transparent 41%) repeat-x; background-size:20px 16px; opacity:.9; }
.candle{ position:absolute; bottom:178px; width:6px; height:34px; background:linear-gradient(var(--white),var(--gold-soft)); border-radius:3px; }
.candle:nth-child(1){ left:70px; } .candle:nth-child(2){ left:107px; height:40px; bottom:184px;} .candle:nth-child(3){ left:144px; }
.flame{
  position:absolute; top:-16px; left:50%; margin-left:-4px; width:8px; height:16px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  background:radial-gradient(circle at 50% 70%, #fff7d0, var(--gold-bright) 55%, #ff8a2b 100%);
  box-shadow:0 0 16px 4px rgba(255,180,60,0.75), 0 0 30px 8px rgba(255,140,20,0.4);
  animation:flicker 1.1s ease-in-out infinite alternate;
  transform-origin:bottom center;
}
@keyframes flicker{ 0%{ transform:scale(1) rotate(-2deg);} 50%{ transform:scale(1.12,1.2) rotate(2deg);} 100%{ transform:scale(0.95,1.05) rotate(-1deg);} }
.cake.cut .tier.base{ transform:translateX(var(--shiftL,0)); }
.cake .half-left, .cake .half-right{ position:absolute; inset:0; transition:transform 1.1s var(--ease-royal), opacity .8s ease .5s; }
.cake.cut .half-left{ transform:translateX(-70px) rotateZ(-6deg); }
.cake.cut .half-right{ transform:translateX(70px) rotateZ(6deg); }
.cake.cut .flame,.cake.cut .candle{ opacity:0; transition:opacity .5s ease; }
.half-right{ clip-path:inset(0 0 0 50%); }
.half-left{ clip-path:inset(0 50% 0 0); }
.cake-caption{ font-family:var(--font-letter); font-style:italic; font-size:18px; color:var(--gold-soft); opacity:0; height:0; transition:opacity .8s ease; text-align:center; margin-top:18px; }
.cake-caption.show{ opacity:1; height:auto; }

/* --- Scene 5: Gallery --- */
.gallery-track{
  display:flex; gap:22px; overflow-x:auto; scroll-snap-type:x mandatory;
  width:100%; max-width:1000px; padding:20px 6vw 30px;
  -webkit-overflow-scrolling:touch;
}
.gallery-track::-webkit-scrollbar{ height:6px; }
.gallery-card{
  flex:0 0 auto; scroll-snap-align:center;
  width:min(260px,68vw); height:340px;
  border-radius:20px; overflow:hidden; position:relative;
  transform:rotate(var(--tilt,0deg));
  transition:transform .4s var(--ease-royal);
}
.gallery-card:nth-child(odd){ --tilt:-2.5deg; }
.gallery-card:nth-child(even){ --tilt:2.5deg; }
.gallery-card:hover{ transform:rotate(0deg) scale(1.04); }
.gallery-card img{ width:100%; height:100%; object-fit:cover; display:block; }
.gallery-card .frame{
  position:absolute; inset:0; border:1px solid var(--glass-border); border-radius:20px; pointer-events:none;
  box-shadow:inset 0 0 40px rgba(0,0,0,0.5);
}
.gallery-card .cap{
  position:absolute; bottom:0; left:0; right:0; padding:14px 16px 12px;
  background:linear-gradient(0deg,rgba(6,10,26,0.9),transparent);
  font-family:var(--font-letter); font-style:italic; font-size:15px; color:var(--gold-soft);
}
.gallery-placeholder{
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(150deg,var(--royal), var(--royal-deep) 60%);
}
.gallery-placeholder span{ font-family:var(--font-display); font-size:44px; color:var(--gold); opacity:.55; }
.gallery-hint{ font-size:12px; letter-spacing:.15em; color:var(--gold-soft); opacity:.5; margin-top:6px; text-align:center; }

/* --- Scene 6: Gift Box --- */
.gift-stage{ perspective:1100px; margin-bottom:8px; }
.gift-box{ position:relative; width:180px; height:150px; transform-style:preserve-3d; }
.gift-body{ position:absolute; bottom:0; width:180px; height:120px; background:linear-gradient(135deg,var(--royal-light),var(--royal)); border-radius:10px; box-shadow:0 20px 40px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(212,175,55,0.4); }
.gift-ribbon-v{ position:absolute; bottom:0; left:50%; margin-left:-11px; width:22px; height:120px; background:linear-gradient(90deg,var(--gold),var(--gold-bright),var(--gold)); }
.gift-lid{ position:absolute; bottom:112px; width:196px; height:36px; left:-8px; background:linear-gradient(135deg,v
